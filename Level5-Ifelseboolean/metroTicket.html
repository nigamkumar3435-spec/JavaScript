<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metro Ticketing</title>
</head>
<body>
    <script>
        let age=6;
        let gender="Male";
        let finaldiscount;

        if(age<5)
        {
            finaldiscount = 100;
        }
        else if(gender==="Female" || age<=8)
        {
            finaldiscount=50;
        }
        //else if(age<=8)
        //{
        //    finaldiscount=50;
        //}
        else if(age>=65)
        {
            finaldiscount=30;
        }
        else{
            finaldiscount=0;
        }
        
        console.log(`Your Final discount is ${finaldiscount}`);
    </script>
</body>
</html>
