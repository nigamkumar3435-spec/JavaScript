<!DOCTYPE html>
<html lang="en">
<head>
    <title>Cricket Game</title>
    <style>
        body{
            text-align: center;
        }
    </style>
</head>

<!-- It is working but some function has to be added. -->
<body>
    <h1>Bat Ball Stump Game</h1>

    <button onclick="
    let computerChoice=generateComputerChoice();
    let resultMsg=getResult('Bat',computerChoice);

    showResult('Bat', computerChoice, resultMsg);
    ">Bat</button>

    <button onclick="
    computerChoice=generateComputerChoice();
    resultMsg=getResult('Ball',computerChoice);

    showResult('Ball', computerChoice, resultMsg);
    ">Ball</button>

    <button onclick="
    computerChoice=generateComputerChoice();
    resultMsg=getResult('Stump',computerChoice);

    showResult('Stump', computerChoice, resultMsg);
    ">Stump</button>

    <script>

        let score={
            win:0,
            lost:0,
            tie:0,
            displayScore: function()
            {
                return `Won:${score.win}, Lost:${score.lost}, Tie:${score.tie}`;
            }
        };
    
        function generateComputerChoice()
        {
            let randomNum = Math.random() * 3;
            
            if(randomNum>0 && randomNum<=1)
            {
                return 'Bat';
            }
            else if(randomNum>1 && randomNum<=2)
            {
                return 'Ball';
            }
            else
            {
                return 'Stump';
            }
        }

        function getResult(userMove, computerMove)
        {
            if(userMove === computerMove)
            {
                score.tie++;
                return `It's a tie.`;
            }
            else if(userMove === 'Bat' && computerMove === 'Ball')
            {
                score.win++;
                return 'User won';
            }
            else if(userMove === 'Stump' && computerMove === 'Bat')
            {
                score.win++;
                return `User won`;
            }
            else if(userMove === 'Ball' && computerMove === 'Stump')
            {
                score.win++;
                return `User won`;
            }
            else
            {
                score.lost++;
                return `Computer won`;
            }
        }

        function showResult(userMove, computerChoice, resultMsg)
        {
            //console.log(score);
            alert(`You have chosen ${userMove}, Computer has chosen ${computerChoice} 
            
            ${resultMsg}

            ${score.displayScore()}`);
        }
    </script>
</body>
</html>
