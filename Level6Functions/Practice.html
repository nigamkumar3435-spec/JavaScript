        function isOdd(num)
        {
            let rem=num%2;
            let isOdd = rem == 1;
            return isOdd;
        }
        console.log(isOdd(5));
        console.log(isOdd(6));
        //2. to return larger of the two numbers.

        function larger(x,y)
        {
            /*if(x>y)
            return x;
            else 
            return y;*/
            return x>y?x:y;
        }
        console.log(larger(4,7));
        console.log(larger(9,3));

        //3. to convert celsius to fahrenheit.

        function convert(celsius)
        {
            let fahrenheit=(9/5)*celsius + 32;
            return fahrenheit;
        }
        console.log(convert(100));
        console.log(convert(97.6));
